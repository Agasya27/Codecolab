openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Collaborative Code Editor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: files
    description: File management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List all files
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
    post:
      operationId: createFile
      tags: [files]
      summary: Create a new file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFileRequest"
      responses:
        "201":
          description: File created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
  /files/{fileId}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get a file by ID
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "404":
          description: File not found
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: File deleted
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    File:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        content:
          type: string
        language:
          type: string
        lastModified:
          type: number
        revision:
          type: number
      required:
        - id
        - name
        - content
        - language
        - lastModified
        - revision
    CreateFileRequest:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        language:
          type: string
      required:
        - name
        - content
        - language
